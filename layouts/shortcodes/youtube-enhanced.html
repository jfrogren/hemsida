{{ $id := .Get 0 | default (.Get "id") }}
{{ $start := .Get 1 | default (.Get "start") }}
{{ $end := .Get 2 | default (.Get "end") }}

{{ if $id }}
<div class="video-wrapper" style="position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; max-width: 100%; margin-bottom: 1.5rem;">
  <iframe 
    src="https://www.youtube.com/embed/{{ $id }}{{ if or $start $end }}?{{ if $start }}start={{ $start }}&{{ end }}{{ if $end }}end={{ $end }}{{ end }}{{ end }}" 
    style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;" 
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
    allowfullscreen>
  </iframe>
</div>
{{ else }}
  <p style="color: red;">Fel: Inget YouTube-ID angavs i shortcoden.</p>
{{ end }}
